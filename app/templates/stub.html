{% extends 'layout.html' %}

{% block layout_content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden max-w-4xl mx-auto mt-10">
    <div class="px-6 py-12 flex flex-col items-center justify-center text-center">
        <div class="w-20 h-20 bg-brand-accent/10 text-brand-accent rounded-full flex items-center justify-center mb-6">
            <i class="fa-solid fa-person-digging text-4xl"></i>
        </div>
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 tracking-tight mb-3">
            {{ title|default('Sección en construcción') }}
        </h1>
        <p class="text-gray-500 max-w-md mx-auto mb-8 text-lg">
            {{ message|default('Esta funcionalidad está siendo desarrollada por el equipo y estará disponible próximamente.') }}
        </p>
        
        <a href="{{ url_for('equipos') }}" class="px-6 py-3 bg-brand-accent hover:bg-blue-700 text-white font-medium rounded-lg shadow-sm transition-colors flex items-center justify-center">
            <i class="fa-solid fa-house mr-2"></i> Volver al Inicio
        </a>
    </div>
</div>
{% endblock %}
