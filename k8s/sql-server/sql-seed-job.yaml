apiVersion: batch/v1
kind: Job
metadata:
  name: mssql-seed
  namespace: inventario-seguro
spec:
  template:
    spec:
      containers:
        - name: sqlcmd-client
          image: mcr.microsoft.com/mssql-tools:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              echo "Estableciendo conexión con SQL Server Remoto en la otra Notebook..."
              echo "Destino: $SQL_SERVER_HOST:$SQL_SERVER_PORT"
              
              /opt/mssql-tools/bin/sqlcmd -S "$SQL_SERVER_HOST,$SQL_SERVER_PORT" -U "$SQL_SERVER_USER" -P "$SQL_SERVER_PASSWORD" -i /scripts/init.sql -t 45 -C
              
              if [ $? -eq 0 ]; then
                echo "¡Estructura relacional y registros de la EGI inyectados con éxito!"
                exit 0
              else
                echo "ERROR: Falló la comunicación con el motor SQL Server remoto."
                exit 1
              fi
          env:
            - name: SQL_SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: pfsense-config
                  key: PFSENSE_WAN_IP
            - name: SQL_SERVER_PORT
              value: "1433"
            - name: SQL_SERVER_USER
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SQL_SERVER_USER
            - name: SQL_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SQL_SERVER_PASSWORD
          volumeMounts:
            - name: script-volume
              mountPath: /scripts
      volumes:
        - name: script-volume
          configMap:
            name: sql-script-config
      restartPolicy: OnFailure
  backoffLimit: 2
