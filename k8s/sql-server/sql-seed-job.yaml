apiVersion: v1
kind: ConfigMap
metadata:
  name: sql-script-config
  namespace: inventario-seguro
data:
  init.sql: |
    IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = 'ubicacion_db')
    BEGIN
        CREATE DATABASE ubicacion_db;
    END
    GO
    USE ubicacion_db;
    GO
    IF NOT EXISTS (SELECT * FROM sys.objects WHERE object_id = OBJECT_ID(N'[dbo].[aulas]') AND type in (N'U'))
    BEGIN
        CREATE TABLE aulas (
            id_aula INT IDENTITY(1,1) PRIMARY KEY,
            nombre VARCHAR(100) NOT NULL,
            tipo VARCHAR(20) NOT NULL CHECK (tipo IN ('aula','laboratorio')),
            piso INT,
            edificio VARCHAR(50)
        );
        CREATE TABLE responsables (
            id_responsable INT IDENTITY(1,1) PRIMARY KEY,
            nombre VARCHAR(100) NOT NULL,
            apellido VARCHAR(100) NOT NULL,
            email VARCHAR(150) UNIQUE NOT NULL
        );
        CREATE TABLE equipos (
            id_equipo VARCHAR(20) PRIMARY KEY,
            codigo_inventario VARCHAR(50) UNIQUE NOT NULL,
            id_aula INT NOT NULL,
            numero_banco VARCHAR(10) NOT NULL,
            estado VARCHAR(20) NOT NULL DEFAULT 'activo' CHECK (estado IN ('activo','en_reparacion','baja','disponible','asignado')),
            id_responsable INT,
            fecha_ingreso DATE NOT NULL,
            FOREIGN KEY (id_aula) REFERENCES aulas(id_aula),
            FOREIGN KEY (id_responsable) REFERENCES responsables(id_responsable)
        );
        CREATE TABLE asignaciones (
            id_asignacion INT IDENTITY(1,1) PRIMARY KEY,
            id_equipo VARCHAR(20) NOT NULL,
            usuario_uid VARCHAR(50) NOT NULL,
            rol_assigned VARCHAR(20) NOT NULL CHECK (rol_assigned IN ('alumno','docente','tecnico')),
            fecha_desde DATE NOT NULL,
            fecha_hasta DATE,
            activa BIT NOT NULL DEFAULT 1,
            FOREIGN KEY (id_equipo) REFERENCES equipos(id_equipo)
        );
        CREATE TABLE mantenimientos (
            id_mant INT IDENTITY(1,1) PRIMARY KEY,
            id_equipo VARCHAR(20) NOT NULL,
            fecha_mant DATE NOT NULL,
            tipo VARCHAR(30) NOT NULL CHECK (tipo IN ('preventivo','correctivo','limpieza')),
            descripcion VARCHAR(500),
            tecnico VARCHAR(100),
            proximo_mant DATE,
            FOREIGN KEY (id_equipo) REFERENCES equipos(id_equipo)
        );
        
